name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  SOLUTION_PATH: ASIBackbone.slnx
  CONFIGURATION: Release
  PACKAGE_OUTPUT: artifacts/packages
  COVERAGE_OUTPUT: artifacts/coverage

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest

    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: moderate

  build-test-pack:
    name: Build, test, and pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      - name: Display .NET information
        run: dotnet --info

      - name: Restore
        run: dotnet restore "$SOLUTION_PATH"

      - name: Build
        run: dotnet build "$SOLUTION_PATH" --configuration "$CONFIGURATION" --no-restore

      - name: Verify formatting
        run: dotnet format "$SOLUTION_PATH" --verify-no-changes --verbosity minimal

      - name: Test with coverage gate
        run: >
          dotnet test "$SOLUTION_PATH"
          --configuration "$CONFIGURATION"
          --no-build
          --verbosity normal
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput="${{ github.workspace }}/${{ env.COVERAGE_OUTPUT }}/"
          /p:Threshold=75
          /p:ThresholdType=line
          /p:ThresholdStat=total

      - name: Pack Core package
        run: >
          dotnet pack
          src/CDCavell.ASIBackbone.Core/CDCavell.ASIBackbone.Core.csproj
          --configuration "$CONFIGURATION"
          --no-build
          --output "$PACKAGE_OUTPUT"

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: asi-backbone-packages
          path: ${{ env.PACKAGE_OUTPUT }}/*.nupkg
          if-no-files-found: error

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: asi-backbone-coverage
          path: ${{ env.COVERAGE_OUTPUT }}/coverage.cobertura.xml
          if-no-files-found: error

  codeql-analysis:
    name: CodeQL analysis
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          languages: 'actions,csharp'
          build-mode: none

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build solution for CodeQL
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration ${{ env.CONFIGURATION }} --no-restore /p:ContinuousIntegrationBuild=true

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
