name: CI

on:
  workflow_dispatch:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  SOLUTION_PATH: AsiBackbone.slnx
  CONFIGURATION: Release
  PACKAGE_OUTPUT: artifacts/packages
  COVERAGE_OUTPUT: artifacts/coverage
  CORE_TEST_PROJECT: tests/CDCavell.AsiBackbone.Core.Tests/CDCavell.AsiBackbone.Core.Tests.csproj
  CORE_COVERAGE_OUTPUT: artifacts/coverage/core
  CORE_BRANCH_COVERAGE_THRESHOLD: 90

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest

    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: moderate

  build-test-pack:
    name: Build, test, and pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json

      - name: Display .NET information
        run: dotnet --info

      - name: Restore
        run: dotnet restore "$SOLUTION_PATH"

      - name: Build
        run: dotnet build "$SOLUTION_PATH" --configuration "$CONFIGURATION" --no-restore

      - name: Verify formatting
        run: dotnet format "$SOLUTION_PATH" --verify-no-changes --verbosity minimal

      - name: Test with coverage gate
        run: >
          dotnet test "$SOLUTION_PATH"
          --configuration "$CONFIGURATION"
          --no-build
          --verbosity normal
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput="${{ github.workspace }}/${{ env.COVERAGE_OUTPUT }}/"
          /p:Threshold=75
          /p:ThresholdType=line
          /p:ThresholdStat=total

      - name: Test Core with branch coverage gate
        run: >
          dotnet test "$CORE_TEST_PROJECT"
          --configuration "$CONFIGURATION"
          --no-build
          --verbosity normal
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput="${{ github.workspace }}/${{ env.CORE_COVERAGE_OUTPUT }}/"
          /p:Include="[CDCavell.AsiBackbone.Core]*"
          /p:Exclude="[*.Tests]*"
          /p:Threshold="$CORE_BRANCH_COVERAGE_THRESHOLD"
          /p:ThresholdType=branch
          /p:ThresholdStat=total

      - name: Pack packages
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$PACKAGE_OUTPUT"

          mapfile -t package_projects < <(find ./src -name '*.csproj' -type f -not -path '*/templates/*' | sort)

          if [ "${#package_projects[@]}" -eq 0 ]; then
            echo "No package projects were found under ./src."
            exit 1
          fi

          for project in "${package_projects[@]}"; do
            echo "Packing $project"
            dotnet pack "$project" \
              --configuration "$CONFIGURATION" \
              --output "$PACKAGE_OUTPUT" \
              /p:ContinuousIntegrationBuild=true
          done

      - name: Validate dotnet new templates
        shell: bash
        run: bash ./eng/smoke-tests/template-package-smoke.sh "$PACKAGE_OUTPUT"

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: asi-backbone-packages
          path: ${{ env.PACKAGE_OUTPUT }}/*.nupkg
          if-no-files-found: error

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: asi-backbone-coverage
          path: ${{ env.COVERAGE_OUTPUT }}/coverage.cobertura.xml
          if-no-files-found: error

      - name: Upload Core branch coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: asi-backbone-core-branch-coverage
          path: ${{ env.CORE_COVERAGE_OUTPUT }}/coverage.cobertura.xml
          if-no-files-found: error

  codeql-analysis:
    name: CodeQL analysis
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: 'actions,csharp'
          build-mode: none

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution for CodeQL
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration ${{ env.CONFIGURATION }} --no-restore /p:ContinuousIntegrationBuild=true

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
