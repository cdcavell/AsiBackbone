name: Diagnostic Build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Capture build diagnostics
    runs-on: ubuntu-latest

    outputs:
      diagnostics: ${{ steps.build.outputs.diagnostics }}
      exit-code: ${{ steps.build.outputs.exit-code }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore AsiBackbone.slnx

      - name: Capture build diagnostics
        id: build
        shell: bash
        run: |
          set +e
          dotnet build AsiBackbone.slnx --configuration Debug --no-restore > build.log 2>&1
          exit_code=$?

          {
            echo 'diagnostics<<EOF'
            grep -E 'error [A-Z]+[0-9]+|Build FAILED|error:' build.log | tail -n 80
            echo 'EOF'
            echo "exit-code=$exit_code"
          } >> "$GITHUB_OUTPUT"

  report:
    name: Report build diagnostics
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Show build diagnostics
        env:
          DIAGNOSTICS: ${{ needs.build.outputs.diagnostics }}
          EXIT_CODE: ${{ needs.build.outputs.exit-code }}
        shell: bash
        run: |
          printf '%s\n' "$DIAGNOSTICS"
          test "$EXIT_CODE" = '0'
