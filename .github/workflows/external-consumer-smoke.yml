name: External Consumer Smoke Test

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main

  push:
    branches:
      - main

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CONFIGURATION: Release
  PACKAGE_OUTPUT: artifacts/packages

jobs:
  external-consumer-smoke:
    name: External consumer package smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false


      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Display .NET information
        run: dotnet --info

      - name: Run external consumer smoke test
        shell: bash
        run: bash ./eng/smoke-tests/external-consumer-smoke.sh

      - name: Run stable package integration smoke tests
        shell: bash
        run: bash ./eng/smoke-tests/stable-package-integration-smoke.sh
