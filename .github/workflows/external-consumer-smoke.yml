name: External Consumer Smoke Test

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main

  push:
    branches:
      - main

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CONFIGURATION: Release
  PACKAGE_OUTPUT: artifacts/packages

jobs:
  external-consumer-smoke:
    name: External consumer package smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json

      - name: Display .NET information
        run: dotnet --info

      - name: Run external consumer smoke test
        shell: bash
        run: bash ./eng/smoke-tests/external-consumer-smoke.sh
