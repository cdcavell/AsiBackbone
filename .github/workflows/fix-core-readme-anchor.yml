name: Fix Core package README anchor

on:
  push:
    branches:
      - release/3.0.1
    paths:
      - .github/workflows/fix-core-readme-anchor.yml

permissions:
  contents: write

jobs:
  fix-readme-anchor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: release/3.0.1

      - name: Restore package README validation anchor
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("README.md")
          text = path.read_text(encoding="utf-8")
          old = "Stable `3.0.x` is the current package family, and `3.0.1` is the current patch release."
          new = "Stable `3.0.x` package family. `3.0.1` is the current patch release."

          if old not in text:
              raise SystemExit("Expected README package-family sentence was not found.")

          text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8")
          Path(".github/workflows/fix-core-readme-anchor.yml").unlink()
          PY

      - name: Commit corrected README anchor
        shell: bash
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md .github/workflows/fix-core-readme-anchor.yml
          git commit -m "docs: restore Core package README validation anchor"
          git push origin HEAD:release/3.0.1
