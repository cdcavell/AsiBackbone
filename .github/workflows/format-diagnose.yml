name: Format Diagnose

on:
  push:
    branches:
      - issue-555-managed-key-metadata-classification

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore AsiBackbone.slnx

      - name: Apply formatter and capture patch
        shell: bash
        run: |
          set -euo pipefail
          dotnet format AsiBackbone.slnx --verbosity minimal
          git diff -- src/AsiBackbone.Signing.ManagedKey tests/AsiBackbone.Signing.ManagedKey.Tests > format.patch
          git diff --name-only -- src/AsiBackbone.Signing.ManagedKey tests/AsiBackbone.Signing.ManagedKey.Tests > format-files.txt

      - name: Upload formatter patch
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: issue-555-format-diagnostics
          path: |
            format.patch
            format-files.txt
          if-no-files-found: error
