name: Publish Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

env:
  CONFIGURATION: Release
  SOLUTION_FILE: './AsiBackbone.slnx'
  PAGES_BASE_URL: 'https://cdcavell.github.io/ASIBackbone'

jobs:
  build-docs:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration ${{ env.CONFIGURATION }} --no-restore /p:ContinuousIntegrationBuild=true

      - name: Run tests with coverage
        shell: pwsh
        run: |
          dotnet test ${{ env.SOLUTION_FILE }} `
          --configuration ${{ env.CONFIGURATION }} `
          --no-restore `
          --no-build `
          --verbosity normal `
          --collect:"XPlat Code Coverage" `
          --logger "trx" `
          --results-directory "./artifacts/test-results" `
          /p:ContinuousIntegrationBuild=true

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Generate coverage report
        shell: pwsh
        run: |
          dotnet reportgenerator `
            -reports:"./artifacts/test-results/**/coverage.cobertura.xml" `
            -targetdir:"./artifacts/coverage-report" `
            -reporttypes:"Html;MarkdownSummaryGithub;Cobertura" `
            -assemblyfilters:"-*.Tests" `
            -filefilters:"-**/bin/**;-**/obj/**;-**/*.g.cs"

      - name: Preserve deployed mutation reports
        shell: bash
        run: |
          set -euo pipefail

          preserve_root="./artifacts/preserved-pages"
          mkdir -p "$preserve_root"

          for report in core aspnetcore; do
            report_url="${PAGES_BASE_URL%/}/mutation/${report}/"

            echo "Attempting to preserve deployed mutation report from $report_url"

            if wget \
              --recursive \
              --level=2 \
              --page-requisites \
              --no-parent \
              --no-host-directories \
              --cut-dirs=1 \
              --directory-prefix "$preserve_root" \
              "$report_url"; then
              echo "Preserved deployed mutation report: $report"
            else
              echo "No deployed mutation report found for: $report"
            fi
          done

          if [ -d "$preserve_root/mutation" ]; then
            find "$preserve_root/mutation" -maxdepth 3 -type f | sort
          fi

      - name: Build DocFX site
        run: dotnet tool run docfx -- docs/docfx.json

      - name: Copy coverage report to DocFX output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "./docs/_site/coverage" -Force | Out-Null
          Copy-Item -Path "./artifacts/coverage-report/*" -Destination "./docs/_site/coverage" -Recurse -Force

      - name: Restore deployed mutation reports to DocFX output
        shell: bash
        run: |
          set -euo pipefail

          preserved_mutation="./artifacts/preserved-pages/mutation"
          output_mutation="./docs/_site/mutation"

          if [ -d "$preserved_mutation" ] && find "$preserved_mutation" -type f | grep -q .; then
            mkdir -p "$output_mutation"
            cp -a "$preserved_mutation/." "$output_mutation/"
            echo "Restored preserved mutation reports to $output_mutation"
            find "$output_mutation" -maxdepth 3 -type f | sort
          else
            echo "No preserved mutation reports found to restore."
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/_site

  deploy-docs:
    name: Deploy documentation
    needs: build-docs
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
