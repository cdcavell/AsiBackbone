name: Publish AsiBackbone Packages

on:
  push:
    tags:
      - 'v*.*.*'

  workflow_dispatch:
    inputs:
      publish_source:
        description: 'Package source URL used by dotnet nuget push.'
        required: true
        default: 'https://nuget.pkg.github.com/cdcavell/index.json'
      skip_publish:
        description: 'Pack only and skip dotnet nuget push.'
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION_PATH: AsiBackbone.slnx
  CONFIGURATION: Release
  PACKAGE_OUTPUT: ./artifacts/packages

concurrency:
  group: publish-asi-backbone-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pack-packages:
    name: Validate and pack packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json

      - name: Validate version metadata
        shell: pwsh
        run: |
          $arguments = @{}

          if ('${{ github.ref_type }}' -eq 'tag') {
              $arguments['TagName'] = '${{ github.ref_name }}'
          }

          ./scripts/Validate-VersionConsistency.ps1 @arguments

      - name: Restore dependencies
        run: dotnet restore "${{ env.SOLUTION_PATH }}"

      - name: Build solution
        run: dotnet build "${{ env.SOLUTION_PATH }}" --configuration "${{ env.CONFIGURATION }}" --no-restore /p:ContinuousIntegrationBuild=true

      - name: Verify formatting
        run: dotnet format "${{ env.SOLUTION_PATH }}" --verify-no-changes --verbosity minimal

      - name: Run tests
        run: >
          dotnet test "${{ env.SOLUTION_PATH }}"
          --configuration "${{ env.CONFIGURATION }}"
          --no-restore
          --no-build
          --verbosity normal
          /p:ContinuousIntegrationBuild=true

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Build DocFX site
        run: dotnet tool run docfx -- docs/docfx.json

      - name: Pack packages
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${{ env.PACKAGE_OUTPUT }}"

          mapfile -t package_projects < <(find ./src -name '*.csproj' -type f | sort)

          if [ "${#package_projects[@]}" -eq 0 ]; then
            echo "No package projects were found under ./src."
            exit 1
          fi

          for project in "${package_projects[@]}"; do
            echo "Packing $project"
            dotnet pack "$project" \
              --configuration "${{ env.CONFIGURATION }}" \
              --output "${{ env.PACKAGE_OUTPUT }}" \
              /p:ContinuousIntegrationBuild=true
          done

      - name: Validate generated package versions
        shell: pwsh
        run: |
          $arguments = @{
              PackageDirectory = '${{ env.PACKAGE_OUTPUT }}'
          }

          if ('${{ github.ref_type }}' -eq 'tag') {
              $arguments['TagName'] = '${{ github.ref_name }}'
          }

          ./scripts/Validate-VersionConsistency.ps1 @arguments

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: asi-backbone-packages
          path: ${{ env.PACKAGE_OUTPUT }}/*.nupkg
          if-no-files-found: error

  publish-packages:
    name: Publish packages
    needs: pack-packages
    runs-on: ubuntu-latest

    environment:
      name: package-publish

    if: github.event_name == 'push' || inputs.skip_publish == false

    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json

      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: asi-backbone-packages
          path: ./artifacts/packages

      - name: Resolve package source
        id: source
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ inputs.publish_source }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://api.nuget.org/v3/index.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish packages
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_SOURCE: ${{ steps.source.outputs.url }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          packages=(./artifacts/packages/*.nupkg)

          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No package artifacts were found."
            exit 1
          fi

          api_key="$NUGET_API_KEY"

          if [ "$PACKAGE_SOURCE" = "https://nuget.pkg.github.com/cdcavell/index.json" ]; then
            api_key="$GITHUB_TOKEN"
          fi

          if [ -z "$api_key" ]; then
            echo "Package source requires an API key. Configure NUGET_API_KEY or publish to GitHub Packages with GITHUB_TOKEN."
            exit 1
          fi

          for package in "${packages[@]}"; do
            echo "Publishing $package to $PACKAGE_SOURCE"
            dotnet nuget push "$package" \
              --api-key "$api_key" \
              --source "$PACKAGE_SOURCE" \
              --skip-duplicate
          done
