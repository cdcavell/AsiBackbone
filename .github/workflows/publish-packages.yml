name: Publish AsiBackbone Packages

on:
  push:
    tags:
      - 'v*.*.*'

  workflow_dispatch:
    inputs:
      publish_source:
        description: 'Package source URL used by dotnet nuget push.'
        required: true
        default: 'https://nuget.pkg.github.com/cdcavell/index.json'
      skip_publish:
        description: 'Pack only and skip dotnet nuget push.'
        required: true
        type: boolean
        default: true

# Deny all GitHub token permissions by default.
permissions: {}

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION_PATH: AsiBackbone.slnx
  CONFIGURATION: Release
  PACKAGE_OUTPUT: ./artifacts/packages
  SBOM_OUTPUT: ./artifacts/package-sbom

concurrency:
  group: publish-asi-backbone-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pack-packages:
    name: Validate and pack packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Validate version metadata
        shell: pwsh
        run: |
          $arguments = @{}

          if ('${REF_TYPE}' -eq 'tag') {
              $arguments['TagName'] = '${REF_NAME}'
          }

          ./scripts/Validate-VersionConsistency.ps1 @arguments
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}

      - name: Restore dependencies
        run: dotnet restore "${{ env.SOLUTION_PATH }}"

      - name: Build solution
        run: dotnet build "${{ env.SOLUTION_PATH }}" --configuration "${{ env.CONFIGURATION }}" --no-restore /p:ContinuousIntegrationBuild=true

      - name: Verify formatting
        run: dotnet format "${{ env.SOLUTION_PATH }}" --verify-no-changes --verbosity minimal

      - name: Run tests
        run: >
          dotnet test "${{ env.SOLUTION_PATH }}"
          --configuration "${{ env.CONFIGURATION }}"
          --no-restore
          --no-build
          --verbosity normal
          /p:ContinuousIntegrationBuild=true

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Build DocFX site
        run: dotnet tool run docfx -- docs/docfx.json

      - name: Pack packages
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${{ env.PACKAGE_OUTPUT }}"

          mapfile -t package_projects < <(find ./src -name '*.csproj' -type f -not -path '*/templates/*' | sort)

          if [ "${#package_projects[@]}" -eq 0 ]; then
            echo "No package projects were found under ./src."
            exit 1
          fi

          for project in "${package_projects[@]}"; do
            if [[ "$project" == *"/templates/"* ]]; then
              echo "Template payload project entered package publish candidates: $project"
              exit 1
            fi
          done

          for project in "${package_projects[@]}"; do
            echo "Packing $project"
            dotnet pack "$project" \
              --configuration "${{ env.CONFIGURATION }}" \
              --output "${{ env.PACKAGE_OUTPUT }}" \
              /p:ContinuousIntegrationBuild=true
          done

      - name: Validate generated package versions
        shell: pwsh
        run: |
          $arguments = @{
              PackageDirectory = '${{ env.PACKAGE_OUTPUT }}'
          }

          if ('${REF_TYPE}' -eq 'tag') {
              $arguments['TagName'] = '${REF_NAME}'
          }

          ./scripts/Validate-VersionConsistency.ps1 @arguments
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}

      - name: Validate generated NuGet metadata
        shell: pwsh
        run: ./scripts/Validate-NuGetPackageMetadata.ps1 -PackageDirectory '${{ env.PACKAGE_OUTPUT }}'

      - name: Generate package SBOMs
        shell: pwsh
        run: ./scripts/New-NuGetPackageSbom.ps1 -PackageDirectory '${{ env.PACKAGE_OUTPUT }}' -OutputDirectory '${{ env.SBOM_OUTPUT }}'

      - name: Attest package provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: ${{ env.PACKAGE_OUTPUT }}/*.nupkg

      - name: Attest package SBOM provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: ${{ env.SBOM_OUTPUT }}/*.json

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: asi-backbone-packages
          path: ${{ env.PACKAGE_OUTPUT }}/*.nupkg
          if-no-files-found: error

      - name: Upload package SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: asi-backbone-package-sboms
          path: ${{ env.SBOM_OUTPUT }}/*.json
          if-no-files-found: error

  publish-packages:
    name: Publish packages
    needs: pack-packages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    environment:
      name: package-publish

    if: github.event_name == 'push' || inputs.skip_publish == false

    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: asi-backbone-packages
          path: ./artifacts/packages

      - name: Resolve package source
        id: source
        shell: bash
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "url=${INPUTS_PUBLISH_SOURCE}" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://api.nuget.org/v3/index.json" >> "$GITHUB_OUTPUT"
          fi
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUTS_PUBLISH_SOURCE: ${{ inputs.publish_source }}

      - name: NuGet login
        if: steps.source.outputs.url == 'https://api.nuget.org/v3/index.json'
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: nuget-login
        with:
          user: CDCavell

      - name: Publish packages
        shell: bash
        env:
          NUGET_TRUSTED_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_SOURCE: ${{ steps.source.outputs.url }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          packages=(./artifacts/packages/*.nupkg)

          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No package artifacts were found."
            exit 1
          fi

          api_key="$NUGET_TRUSTED_API_KEY"

          if [ "$PACKAGE_SOURCE" = "https://nuget.pkg.github.com/cdcavell/index.json" ]; then
            api_key="$GITHUB_TOKEN"
          fi

          if [ -z "$api_key" ]; then
            echo "Package source requires an API key."
            exit 1
          fi

          for package in "${packages[@]}"; do
            echo "Publishing $package to $PACKAGE_SOURCE"
            dotnet nuget push "$package" \
              --api-key "$api_key" \
              --source "$PACKAGE_SOURCE" \
              --skip-duplicate
          done
