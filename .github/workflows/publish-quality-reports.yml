name: Publish Quality Reports

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

env:
  CONFIGURATION: Release
  SOLUTION_FILE: './AsiBackbone.slnx'
  CORE_TEST_PROJECT: './tests/CDCavell.AsiBackbone.Core.Tests/CDCavell.AsiBackbone.Core.Tests.csproj'
  CORE_COVERAGE_OUTPUT: '${{ github.workspace }}/artifacts/core-coverage'
  CORE_BRANCH_COVERAGE_THRESHOLD: 90

jobs:
  build-docs:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration ${{ env.CONFIGURATION }} --no-restore /p:ContinuousIntegrationBuild=true

      - name: Run tests with coverage
        shell: pwsh
        run: |
          dotnet test ${{ env.SOLUTION_FILE }} `
          --configuration ${{ env.CONFIGURATION }} `
          --no-restore `
          --no-build `
          --verbosity normal `
          --collect:"XPlat Code Coverage" `
          --logger "trx" `
          --results-directory "./artifacts/test-results" `
          /p:ContinuousIntegrationBuild=true

      - name: Run Core tests with branch coverage gate
        shell: pwsh
        run: |
          dotnet test ${{ env.CORE_TEST_PROJECT }} `
            --configuration ${{ env.CONFIGURATION }} `
            --no-restore `
            --no-build `
            --verbosity normal `
            --logger "trx" `
            --results-directory "./artifacts/core-test-results" `
            /p:ContinuousIntegrationBuild=true `
            /p:CollectCoverage=true `
            /p:CoverletOutputFormat=cobertura `
            /p:CoverletOutput="${{ env.CORE_COVERAGE_OUTPUT }}/" `
            /p:Include="[CDCavell.AsiBackbone.Core]*" `
            /p:Exclude="[*.Tests]*" `
            /p:Threshold="${{ env.CORE_BRANCH_COVERAGE_THRESHOLD }}" `
            /p:ThresholdType=branch `
            /p:ThresholdStat=total

      - name: List Core coverage outputs
        shell: pwsh
        run: |
          Get-ChildItem -Path "${{ github.workspace }}" -Recurse -Filter "*.cobertura.xml" |
            ForEach-Object { Write-Host $_.FullName }

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Generate coverage report
        shell: pwsh
        run: |
          dotnet reportgenerator `
            -reports:"./artifacts/test-results/**/coverage.cobertura.xml" `
            -targetdir:"./artifacts/coverage-report" `
            -reporttypes:"Html;MarkdownSummaryGithub;Cobertura" `
            -assemblyfilters:"-*.Tests" `
            -filefilters:"-**/bin/**;-**/obj/**;-**/*.g.cs"

      - name: Generate Core branch coverage report
        shell: pwsh
        run: |
          dotnet reportgenerator `
            -reports:"${{ env.CORE_COVERAGE_OUTPUT }}/coverage.cobertura.xml" `
            -targetdir:"./artifacts/core-branch-coverage-report" `
            -reporttypes:"Html;MarkdownSummaryGithub;Cobertura" `
            -assemblyfilters:"+CDCavell.AsiBackbone.Core;-*.Tests" `
            -filefilters:"-**/bin/**;-**/obj/**;-**/*.g.cs"

      - name: Generate Core mutation report
        shell: pwsh
        working-directory: tests/CDCavell.AsiBackbone.Core.Tests
        run: |
          dotnet tool run dotnet-stryker -- --config-file stryker-config.json --output "../../artifacts/mutation-report/core"

      - name: Generate ASP.NET Core mutation report
        shell: pwsh
        working-directory: tests/CDCavell.AsiBackbone.AspNetCore.Tests
        run: |
          dotnet tool run dotnet-stryker -- --config-file stryker-config.json --output "../../artifacts/mutation-report/aspnetcore"

      - name: Build DocFX site
        run: dotnet tool run docfx -- docs/docfx.json

      - name: Copy coverage report to DocFX output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "./docs/_site/coverage" -Force | Out-Null
          Copy-Item -Path "./artifacts/coverage-report/*" -Destination "./docs/_site/coverage" -Recurse -Force

      - name: Copy Core branch coverage report to DocFX output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "./docs/_site/coverage/core" -Force | Out-Null
          Copy-Item -Path "./artifacts/core-branch-coverage-report/*" -Destination "./docs/_site/coverage/core" -Recurse -Force

      - name: Copy mutation reports to DocFX output
        shell: pwsh
        run: |
          function Copy-MutationReport {
            param(
              [Parameter(Mandatory = $true)][string]$ReportRoot,
              [Parameter(Mandatory = $true)][string]$TargetRoot
            )

            New-Item -ItemType Directory -Path $TargetRoot -Force | Out-Null

            $indexFile = Get-ChildItem -Path $ReportRoot -Filter "index.html" -Recurse | Select-Object -First 1

            if ($null -eq $indexFile) {
              Write-Host "Stryker report files found under ${ReportRoot}:"
              Get-ChildItem -Path $ReportRoot -Recurse | ForEach-Object { Write-Host $_.FullName }
              throw "Stryker mutation report index.html was not found under $ReportRoot."
            }

            Copy-Item -Path (Join-Path $indexFile.DirectoryName "*") -Destination $TargetRoot -Recurse -Force
          }

          Copy-MutationReport -ReportRoot "./artifacts/mutation-report/core" -TargetRoot "./docs/_site/mutation/core"
          Copy-MutationReport -ReportRoot "./artifacts/mutation-report/aspnetcore" -TargetRoot "./docs/_site/mutation/aspnetcore"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/_site

  deploy-docs:
    name: Deploy documentation
    needs: build-docs
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
