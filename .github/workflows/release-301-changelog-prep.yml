name: Prepare 3.0.1 changelog

on:
  push:
    branches:
      - release/3.0.1
    paths:
      - .github/workflows/release-301-changelog-prep.yml

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: release/3.0.1
          fetch-depth: 0

      - name: Prepend 3.0.1 changelog entry
        shell: python
        run: |
          from pathlib import Path

          path = Path("CHANGELOG.md")
          text = path.read_text(encoding="utf-8")
          heading = "## [3.0.1] - 2026-07-13"

          if heading not in text:
              marker = "## [3.0.0] - 2026-07-13"
              if marker not in text:
                  raise SystemExit(f"Expected changelog marker not found: {marker}")

              entry = """## [3.0.1] - 2026-07-13

### Release summary

`3.0.1` is a compatible patch release for the stable `3.0.x` AsiBackbone package family. It corrects threat-assessment construction, provenance, and restrictive-outcome reason integrity without changing package IDs, public namespaces, the `net10.0` target, or `AssemblyVersion` `3.0.0.0`.

### Changed

* Promoted central package, file, citation, Zenodo, template fallback, and Source Link validation metadata from `3.0.0` to `3.0.1` while preserving `AssemblyVersion` `3.0.0.0`.
* Reserved the complete case-insensitive, normalized `threat.*` metadata namespace for framework-generated threat provenance.
* Documented deterministic restrictive-outcome reason selection and the intentional validation-hardening compatibility boundary.
* Preserved the decision to defer NuGet package signing while AsiBackbone remains independently maintained.

### Fixed

* Fixed undefined numeric `ThreatSeverity` and `GovernanceDecisionOutcome` values reaching evaluator fallback behavior by rejecting them during `ThreatAssessment` construction.
* Fixed malformed contributor enum output so the default contributor-exception policy produces a controlled denied governance decision and skips ordinary constraint execution.
* Fixed contributor metadata being able to overwrite or contradict framework-generated contributor identity, category, severity, confidence, recommended outcome, or effective outcome fields.
* Fixed earlier warning reasons being attached to later `Deferred`, `AcknowledgmentRequired`, or `EscalationRecommended` decisions.
* Fixed equal restrictive outcomes so the first matching reason in deterministic contributor order is retained rather than using a last-writer-wins rule.
* Preserved existing multi-reason denial aggregation and warning-only aggregation.

### Compatibility notes

* Package IDs and public namespaces remain unchanged.
* The target framework remains `net10.0`.
* `AssemblyVersion` remains `3.0.0.0`; `FileVersion` advances to `3.0.1.0`.
* Callers constructing threat assessments from unvalidated numeric or deserialized enum values may now receive `ArgumentOutOfRangeException`.
* Contributors using custom `threat.*` metadata must move those values to a host- or contributor-owned namespace.
* No production key-management, replay-protection, host execution, robotics, legal, or compliance capability is introduced.

### Validation

* Release validation covers Debug and Release builds, formatting, tests, repository and package coverage gates, Core branch coverage, XML documentation, package creation, NuGet metadata, templates, external consumers, stable-package smoke tests, version consistency, DocFX, documentation release claims, CodeQL, dependency review, SBOMs, and provenance where supported.
* After publication, Source Link repository commit metadata can be validated with:

```powershell
./scripts/Validate-Source-Link-commit-metadata.ps1 -Version 3.0.1
```

"""
              text = text.replace(marker, entry + marker, 1)
              path.write_text(text, encoding="utf-8")

          Path(".github/workflows/release-301-changelog-prep.yml").unlink()

      - name: Commit changelog preparation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md .github/workflows/release-301-changelog-prep.yml
          git commit -m "release: add 3.0.1 changelog entry"
          git push origin HEAD:release/3.0.1
