name: Version Consistency

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-version-consistency:
    name: Validate version consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate version consistency
        shell: pwsh
        run: |
          $arguments = @{}

          if ('${REF_NAME}' -eq 'tag') {
              $arguments['TagName'] = '${REF_NAME}'
          }
        
          ./scripts/Validate-VersionConsistency.ps1 @arguments
        env:
          REF_NAME: ${{ github.ref_name }}

      - name: Test documentation release-claim validator
        shell: pwsh
        run: ./scripts/Test-DocumentationReleaseClaims.ps1

      - name: Validate documentation release claims
        shell: pwsh
        run: ./scripts/Validate-DocumentationReleaseClaims.ps1
